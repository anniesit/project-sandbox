<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影視刊物資料庫 · 年份統計</title>
  <link rel="stylesheet" href="chart.css" />
  <link rel="stylesheet" href="https://hkbuproject-sandbox.vercel.app/filmtv/font/genryumin-tc/genryumin-tc.css" />
  <style>
    /* demo page chrome only — the chart owns its own styles in chart.css */
    body {
      margin: 0;
      padding: 2.5rem clamp(1rem, 4vw, 3rem);
      background: #f3f1ee;
      color: #1c1a18;
      font-family: 'GenRyuMin2 TC', 'Songti TC', 'Noto Serif TC', 'PMingLiU', serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .page-head { margin-bottom: 1.5rem; }
    .page-head h1 { margin: 0 0 0.25rem; font-size: 1.5rem; letter-spacing: 0.01em; }
    .page-head p { margin: 0; color: #6b6661; font-size: 0.9rem; }
    .panel {
      background: #fff;
      border: 1px solid rgba(28, 26, 24, 0.10);
      border-radius: 12px;
      padding: 1.5rem clamp(1rem, 3vw, 1.75rem);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .preset {
      padding: 0.4rem 0.8rem;
      border: 1px solid rgba(28, 26, 24, 0.16);
      border-radius: 999px;
      background: #fff;
      font: inherit;
      font-size: 0.8125rem;
      color: #3a3733;
      cursor: pointer;
      transition: all 0.12s ease;
    }
    .preset:hover { border-color: #8a1c2b; color: #8a1c2b; }
    .preset.is-active {
      background: #8a1c2b;
      border-color: #8a1c2b;
      color: #fff;
    }
    .hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #8a847d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <h1>影視刊物資料庫</h1>
      <p>檢索結果年份統計 · 依刊物分色堆疊（西元 1926–1997）</p>
    </header>

    <div class="panel">
      <!-- demo "result set" presets: each calls filmtvChart.render() with a
           subset, showing the y-axis rescale to the new max + the stack recompose -->
      <div class="presets" id="presets">
        <button class="preset is-active" data-preset="all">全部結果</button>
        <button class="preset" data-preset="early">小冊子年代（1926–1958）</button>
        <button class="preset" data-preset="late">雙周刊年代（1979–1997）</button>
        <button class="preset" data-preset="mag">電影雙周刊</button>
        <button class="preset" data-preset="tv">香港電視</button>
      </div>

      <!-- demo view toggle: mirrors the results.js article<->book switch. In
           production results.js fires filmtv:viewchange; here we fire it directly
           so the chart flips between 篇 (entry) and 本 (book) counts. -->
      <div class="presets" id="views">
        <button class="preset is-active" data-view="article">文章統計（篇）</button>
        <button class="preset" data-view="book">書刊統計（本）</button>
      </div>

      <!-- chart.js mounts here. data-height is optional (default 360). -->
      <div data-chart data-height="360" data-src="sample-data/chart-sample.json"></div>

      <p class="hint">桌面：滑過長條看該年明細，點按長條即以該年篩選結果。觸控：輕點長條後再點「查看此年結果 →」。點按圖例則以該刊物篩選。</p>
      <p class="hint" id="demo-status" hidden></p>
    </div>
  </div>

  <script src="chart.js"></script>
  <script>
    // Demo-only driver: fetch the sample once, then feed filtered subsets to the
    // chart on preset click — this mimics different search result sets arriving
    // from the backend. (chart.js already auto-loaded the full set on init.)
    (function () {
      var chartEl = document.querySelector("[data-chart]");
      var presets = document.getElementById("presets");
      var ALL = null;

      var CE = ["CEM", "CEI", "CEY", "CED", "CEF", "CEV", "CEH", "CEP", "CEO"];
      var FILTERS = {
        all: function () { return ALL.items; },
        early: function () { return ALL.items.filter(function (it) { return +it.year <= 1958; }); },
        late: function () { return ALL.items.filter(function (it) { return +it.year >= 1979; }); },
        mag: function () { return ALL.items.filter(function (it) { return CE.indexOf(it.id.slice(0, 3)) >= 0; }); },
        tv: function () { return ALL.items.filter(function (it) { return it.id.slice(0, 3) === "TVW"; }); }
      };

      fetch("sample-data/chart-sample.json")
        .then(function (r) { return r.json(); })
        .then(function (data) { ALL = data; });

      function setActive(preset) {
        presets.querySelectorAll(".preset").forEach(function (b) {
          b.classList.toggle("is-active", b.getAttribute("data-preset") === preset);
        });
      }

      presets.addEventListener("click", function (e) {
        var btn = e.target.closest(".preset");
        if (!btn || !ALL) return;
        setActive(btn.getAttribute("data-preset"));
        status.hidden = true;
        window.filmtvChart.render(chartEl, { items: FILTERS[btn.getAttribute("data-preset")]() });
      });

      // view toggle: fire the same event results.js fires; the chart re-picks
      // its count array (篇 <-> 本) and redraws with no re-fetch.
      var views = document.getElementById("views");
      views.addEventListener("click", function (e) {
        var btn = e.target.closest(".preset");
        if (!btn) return;
        var view = btn.getAttribute("data-view");
        views.querySelectorAll(".preset").forEach(function (b) {
          b.classList.toggle("is-active", b.getAttribute("data-view") === view);
        });
        document.dispatchEvent(new CustomEvent("filmtv:viewchange", { detail: { view: view }, bubbles: true }));
      });

      // This is the BACKEND's job in production: listen for the chart's selection
      // event, narrow the query, and re-render. Here we just filter the sample
      // in-memory and show what would be requested.
      var status = document.getElementById("demo-status");
      document.addEventListener("filmtv:filter", function (e) {
        if (!ALL) return;
        var d = e.detail, items, msg;
        if (d.year != null) {
          items = ALL.items.filter(function (it) { return +it.year === d.year; });
          msg = "已篩選：" + d.year + " 年（" + items.length + " 篇）";
        } else {
          items = ALL.items.filter(function (it) { return d.prefixes.indexOf(it.id.slice(0, 3)) >= 0; });
          msg = "已篩選：" + d.label + "（" + items.length + " 篇）";
        }
        setActive(null);
        status.hidden = false;
        status.textContent = msg + " · 按「全部結果」重設";
        window.filmtvChart.render(chartEl, { items: items });
      });
    })();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影視刊物資料庫 · 書刊閱讀器</title>
    <link rel="stylesheet" href="https://hkbuproject-sandbox.vercel.app/filmtv/font/genryumin-tc/genryumin-tc.css" />
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body>
    <!-- [data-viewer] scopes every hook; .viewer-root carries orientation/fullscreen classes -->
    <div class="viewer-root" data-viewer>
      <!-- ============ TOP NAV (Navigation/Search/Metadata stages — static preview) ============ -->
      <header class="viewer-toolbar-top">
        <div class="nav-group">
          <a href="#" id="js-back"><span class="nav-ico">←</span>返回</a>
          <button id="js-toc-trigger"><span class="nav-ico">☰</span>刊物目錄</button>
          <button id="js-search-trigger"><span class="nav-ico">🔍</span>搜尋內文</button>
        </div>
        <div class="nav-group">
          <button id="js-article-info"><span class="nav-ico">ⓘ</span>文章資訊</button>
          <button id="js-share"><span class="nav-ico">🔗</span></button>
        </div>
      </header>

      <!-- ============ STAGE ============ -->
      <main class="viewer-stage">
        <button class="viewer-arrow" id="js-prev-page" aria-label="上一頁">‹</button>
        <div id="js-page-container" class="viewer-page-container"><!-- cloned from a template --></div>
        <button class="viewer-arrow" id="js-next-page" aria-label="下一頁">›</button>
      </main>

      <!-- ============ BOTTOM CONTROLS ============ -->
      <footer class="viewer-toolbar-bottom">
        <div class="page-indicator">
          <span>頁</span>
          <input id="js-page-input" type="text" inputmode="numeric" value="1" aria-label="頁碼" />
          <span>/</span>
          <span id="js-page-total">16</span>
        </div>

        <div class="controls">
          <span class="ctl-label">版面配置</span>
          <!-- Layout dropdown — design-system single-select (data-dropdown-option
               + .dropdown-option-label + .dropdown-option-check, aria-selected). -->
          <div class="dropdown" data-dropdown id="js-layout-dropdown">
            <input type="hidden" name="layout" value="double" />
            <button type="button" data-dropdown-trigger aria-haspopup="listbox" aria-expanded="false">
              <span data-dropdown-value class="dropdown-trigger-label">雙頁</span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-trigger-icon"><path d="M216.49,104.49l-80,80a12,12,0,0,1-17,0l-80-80a12,12,0,0,1,17-17L128,159l71.51-71.52a12,12,0,0,1,17,17Z"/></svg>
            </button>
            <ul role="listbox" class="dropdown-list">
              <li role="option" aria-selected="true" data-value="double" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">雙頁</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="single" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">單頁</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="ocr" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">顯示純文字</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="thumbnail" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">縮圖</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
            </ul>
          </div>

          <!-- "⋯" scroll popover — two single-select groups (捲動方向 + 連接方向) using
               the SAME check-select pattern + <li> structure as the layout/zoom dropdowns:
               each option's aria-selected reveals the .dropdown-option-check. No radios —
               viewer.js reads the click/keys (data-scroll-direction / data-connect-mode) and
               owns aria-selected/aria-disabled, because forms.js single-select handles only
               ONE group and this menu has two. -->
          <div class="scroll-wrap">
            <button type="button" class="icon-btn" id="js-scroll-popover-trigger" aria-label="捲動設定" aria-haspopup="menu" aria-expanded="false">⋯</button>
            <ul class="dropdown-list cc-viewer-bottom" id="js-scroll-popover" role="menu">
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-scroll-direction="flip" aria-selected="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">翻頁</span>
              </li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-scroll-direction="vertical" aria-selected="false">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">垂直捲動</span>
              </li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-scroll-direction="horizontal" aria-selected="false">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">水平捲動</span>
              </li>
              <li class="scroll-popover-divider" role="separator"></li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-connect-mode="next" aria-selected="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">連接下頁</span>
              </li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-connect-mode="previous" aria-selected="false">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">連接上頁</span>
              </li>
            </ul>
          </div>

          <span class="divider">|</span>
          <span class="ctl-label">縮放</span>
          <!-- Zoom dropdown (no +/- buttons — D1) -->
          <div class="dropdown" data-dropdown id="js-zoom-dropdown">
            <input type="hidden" name="zoom" value="fit-page" />
            <button type="button" data-dropdown-trigger aria-haspopup="listbox" aria-expanded="false">
              <span data-dropdown-value class="dropdown-trigger-label">符合頁面</span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-trigger-icon"><path d="M216.49,104.49l-80,80a12,12,0,0,1-17,0l-80-80a12,12,0,0,1,17-17L128,159l71.51-71.52a12,12,0,0,1,17,17Z"/></svg>
            </button>
            <ul role="listbox" class="dropdown-list">
              <li role="option" aria-selected="false" data-value="fit-width" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">符合頁寬</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="true" data-value="fit-page" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">符合頁面</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="100" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">100%</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="150" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">150%</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
            </ul>
          </div>

          <button type="button" class="icon-btn" id="js-fullscreen" aria-label="全螢幕">⛶</button>

          <span class="divider">|</span>
          <span class="ctl-label">旋轉</span>
          <button type="button" class="icon-btn" id="js-rotate-ccw" aria-label="逆時針旋轉">⟲</button>
          <button type="button" class="icon-btn" id="js-rotate-cw" aria-label="順時針旋轉">⟳</button>
        </div>
      </footer>
    </div>

    <!-- ================= TEMPLATES (inert; cloned by viewer.js) ================= -->
    <template id="tpl-layout-single">
      <img class="page-image" alt="" draggable="false" />
    </template>

    <template id="tpl-layout-double">
      <div class="page-spread">
        <img class="page-image page-image--left" alt="" draggable="false" />
        <img class="page-image page-image--right" alt="" draggable="false" />
      </div>
    </template>

    <template id="tpl-layout-ocr">
      <div class="ocr-panel">
        <button class="ocr-toc-trigger is-hidden" id="js-ocr-toc-trigger" type="button">純文字目錄</button>
        <div class="ocr-content" id="js-ocr-content"></div>
        <div class="ocr-font-controls">
          <span>字體大小</span>
          <button id="js-ocr-font-decrease" type="button">−</button>
          <button id="js-ocr-font-increase" type="button">＋</button>
        </div>
      </div>
      <div class="ocr-page-stage"><img class="page-image" alt="" draggable="false" /></div>
    </template>

    <template id="tpl-layout-thumbnail">
      <div class="thumbnail-grid" id="js-thumbnail-grid"></div>
    </template>

    <template id="tpl-thumbnail-item">
      <button class="thumbnail-item" type="button">
        <img class="thumbnail-image" alt="" />
        <span class="thumbnail-label"></span>
      </button>
    </template>

    <template id="tpl-ocr-article-block">
      <div class="ocr-article-block">
        <div class="ocr-article-meta"></div>
        <div class="ocr-article-body"></div>
      </div>
    </template>

    <template id="tpl-ocr-toc-popover">
      <div class="ocr-toc-popover" id="js-ocr-toc-popover">
        <div class="ocr-toc-header"></div>
        <ul id="js-ocr-toc-list"></ul>
      </div>
    </template>

    <template id="tpl-page-placeholder">
      <div class="page-placeholder">
        <div class="page-placeholder-spinner"></div>
        <span class="page-placeholder-label"></span>
      </div>
    </template>

    <template id="tpl-page-error">
      <div class="page-error">
        <div class="page-error-icon"></div>
        <span class="page-error-label"></span>
      </div>
    </template>

    <!-- Preview-only dropdown behavior: stands in for the design-system forms.js
       (the real site loads bundles/all.js). Toggles .is-open, and on option
       click sets aria-selected + the hidden input value, reflects the label from
       .dropdown-option-label, and dispatches 'input' (what viewer.js listens for). -->
    <script>
      (function () {
        document.querySelectorAll("[data-dropdown]").forEach(function (dd) {
          var trigger = dd.querySelector("[data-dropdown-trigger]");
          var hidden = dd.querySelector('input[type="hidden"]');
          var valueEl = dd.querySelector("[data-dropdown-value]");
          var options = dd.querySelectorAll("[data-dropdown-option], .dropdown-option");
          trigger.addEventListener("click", function (e) {
            e.stopPropagation();
            if (trigger.disabled) return;
            document.querySelectorAll("[data-dropdown].is-open").forEach(function (o) {
              if (o !== dd) o.classList.remove("is-open");
            });
            dd.classList.toggle("is-open");
            trigger.setAttribute("aria-expanded", dd.classList.contains("is-open") ? "true" : "false");
          });
          options.forEach(function (opt) {
            opt.addEventListener("click", function () {
              if (hidden) hidden.value = opt.getAttribute("data-value");
              var lab = opt.querySelector("[data-dropdown-option-label], .dropdown-option-label");
              if (valueEl) valueEl.textContent = ((lab ? lab.textContent : opt.textContent) || "").trim();
              options.forEach(function (o) {
                o.setAttribute("aria-selected", o === opt ? "true" : "false");
              });
              dd.classList.remove("is-open");
              trigger.setAttribute("aria-expanded", "false");
              if (hidden) hidden.dispatchEvent(new Event("input", { bubbles: true }));
            });
          });
        });
        document.addEventListener("click", function () {
          document.querySelectorAll("[data-dropdown].is-open").forEach(function (o) {
            o.classList.remove("is-open");
          });
        });
      })();
    </script>

    <!-- viewer.js = the reusable viewer (stays after integration).
       viewer.mock.js = the disposable sample-data loader + dev switcher. -->
    <script src="viewer.js"></script>
    <script src="viewer.mock.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影視刊物資料庫 · 書刊閱讀器</title>
    <link rel="stylesheet" href="https://hkbuproject-sandbox.vercel.app/filmtv/font/genryumin-tc/genryumin-tc.css" />
    <link rel="stylesheet" href="viewer.css" />

    <!-- ⚠️ PREVIEW CHROME ONLY — not part of the handoff. On the live site all of
         this (page shell, top/bottom toolbars, nav, arrows, dropdowns, buttons,
         inputs, dividers) is authored in Webflow and styled by the Webflow /
         design-system CSS. It is restated here so the standalone viewer.html
         mock renders faithfully without loading the Webflow stylesheet. The
         real viewer engine CSS lives in viewer.css.
         Selectors marked [WF] have a same-named rule in the Webflow export —
         Webflow owns them on the live site; they only exist here for the mock. -->
    <style>
      :root {
        --teal: #00485c;
        --teal-dark: #003240;
        --line: #ade7f7;
        --paper: #fff;
        --primary: "GenRyuMin2 TC", "Songti TC", "Noto Serif TC", serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: var(--primary);
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      /* ---- root shell (flex column: nav / stage / controls) ---- */
      .viewer-root {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--teal-dark);
      }
      .viewer-root.is-fullscreen {
        height: 100vh;
      }

      /* ---- top nav ---- */
      .viewer-toolbar-top {
        background: var(--teal);
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 52px;
        padding: 0 16px;
      }
      .viewer-toolbar-top .nav-group {
        display: flex;
        gap: 32px;
        align-items: center;
      }
      .viewer-toolbar-top a,
      .viewer-toolbar-top button {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        background: none;
        border: 0;
        color: #fff;
        font: 500 16px/1.6 var(--primary);
        cursor: pointer;
      }
      .nav-ico {
        width: 24px;
        height: 24px;
        display: inline-block;
        opacity: 0.9;
      }

      /* ---- stage (Webflow: .page-main.viewer-stage{position:relative}; ensure
       it also has a definite height + overflow:hidden so the absolutely-filled
       #js-page-container clips and the fit rules stay responsive) ---- */
      .viewer-stage {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
      }
      /* the absolutely-filled container itself [WF] — gives the stage's single
       child a definite size so the zoom-fit-page 100%/100% + scroll-strip
       overflow:auto rules above have a box to resolve/clip against, instead of
       growing to content height and silently spilling past .viewer-stage. */
      .viewer-page-container {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        user-select: none;
      }

      /* ---- arrows [WF: .viewer-arrow, :hover, .is-left, .is-right] ---- */
      .viewer-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 5;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 72, 92, 0.55);
        color: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }
      .viewer-arrow:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .viewer-arrow.is-hidden {
        display: none !important;
      }
      #js-prev-page {
        left: 16px;
      }
      #js-next-page {
        right: 16px;
      }

      /* ---- bottom controls ---- */
      .viewer-toolbar-bottom {
        background: var(--teal);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        min-height: 52px;
        gap: 8px;
      }
      .page-indicator {
        display: flex;
        gap: 8px;
        align-items: center;
        font:
          400 16px/1.1 Inter,
          system-ui,
          sans-serif;
      }
      /* [WF: .input.cc-viewer] */
      #js-page-input {
        width: 42px;
        text-align: center;
        padding: 3px 4px;
        color: #fff;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 4px;
        font: inherit;
      }
      #js-page-input:disabled {
        opacity: 0.4;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .controls .ctl-label {
        font: 500 16px/1.6 var(--primary);
      }
      /* [WF: .divider] */
      .divider {
        color: var(--line);
        padding: 0 8px;
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: 0;
        color: #fff;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }
      .icon-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ---- dropdown component [WF: .dropdown, .dropdown-trigger (+ :hover/
       :focus-visible), .dropdown-trigger-label, .dropdown-trigger-icon,
       .dropdown-list, .dropdown-option (+ :hover/:focus-visible),
       .dropdown-option-check]. Webflow authors all of this; restated for the
       mock. Selection is driven by aria-selected (set by forms.js / the preview
       script / viewer.js), NOT by a radio — matching the single-select
       component. The mock uses the [data-dropdown*] attribute hooks; Webflow
       uses the matching classes. ---- */
      [data-dropdown] {
        position: relative;
      }
      [data-dropdown-trigger] {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 4px 8px 4px 12px;
        background: none;
        color: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: 500 16px/1.6 var(--primary);
        cursor: pointer;
      }
      [data-dropdown-trigger]:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .dropdown-trigger-label {
        white-space: nowrap;
      }
      .dropdown-trigger-icon {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        transition: transform 0.15s ease;
      }
      [data-dropdown].is-open .dropdown-trigger-icon {
        transform: rotate(180deg);
      }
      .dropdown-list {
        position: absolute;
        bottom: calc(100% + 6px);
        left: 0;
        min-width: 100%;
        margin: 0;
        padding: 4px;
        list-style: none;
        background: var(--teal);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: none;
        z-index: 20;
      }
      [data-dropdown].is-open .dropdown-list {
        display: block;
      }
      /* option row: label grows, the check sits on whichever side the markup
       places it (right for the DS layout/zoom lists, left for the scroll popover). */
      .dropdown-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        white-space: nowrap;
        border-radius: 4px;
        cursor: pointer;
      }
      .dropdown-option:hover {
        background: rgba(173, 231, 247, 0.15);
      }
      .dropdown-option-label {
        flex: 1 1 auto;
      }
      .dropdown-option-check {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        opacity: 0;
        color: var(--line);
      }
      /* DS single-select shows the check on the aria-selected option */
      .dropdown-option[aria-selected="true"] .dropdown-option-check {
        opacity: 1;
      }
      /* NB: the ⋯ scroll popover (.scroll-wrap / .dropdown-list.cc-viewer-bottom)
         is NOT here — viewer.js drives its open state, so it ships in viewer.css
         (Webflow/forms.js only open [data-dropdown] dropdowns). */

      /* OCR TOC list — now a Webflow-authored template row (.ocr-toc-item), like the
         result cards. Preview copy of what you style in Webflow (replaces the old
         #js-ocr-toc-list id rules that used to live in viewer.css). */
      .ocr-toc-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .ocr-toc-item {
        padding: 4px 6px;
        border-radius: 4px;
        cursor: pointer;
      }
      .ocr-toc-item:hover {
        background: rgba(0, 72, 92, 0.1);
      }
      /* preview hierarchy for the 3 leaves (column / title / author) — your Webflow
         design owns the real look; these just keep the mock legible. */
      .ocr-toc-column {
        font-size: 12px;
        opacity: 0.7;
      }
      .ocr-toc-title {
        font-size: 16px;
        font-weight: 700;
      }
      .ocr-toc-author {
        font-size: 12px;
        opacity: 0.7;
      }

      /* ---- PREVIEW-ONLY: sharpen button + responsive layout drawer. On the live
         site Webflow owns .viewer-nav-btn / .viewer-layout / .viewer-layout-trigger
         (incl. the per-breakpoint translateY). Restated here so the mock exercises
         viewer.js's .is-open / .is-active toggles. [WF] ---- */
      .viewer-nav-btn.cc-sharpen {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #fff;
        padding: 4px 10px;
        font: 500 15px/1.6 var(--primary);
        cursor: pointer;
      }
      .viewer-nav-btn.cc-sharpen.is-active {
        background: var(--line);
        color: var(--teal-dark);
      }
      /* trigger hidden on desktop (drawer is always in-frame) */
      .viewer-layout-trigger {
        display: none;
        gap: 6px;
        align-items: center;
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #fff;
        padding: 4px 10px;
        font: 500 15px/1.6 var(--primary);
        cursor: pointer;
      }
      /* drawer handle (grab bar) — hidden on desktop (drawer is inline); the live
         site styles this in Webflow. [WF] */
      .viewer-layout-close {
        display: none;
      }
      @media (max-width: 991px) {
        .viewer-toolbar-bottom {
          position: relative;
        }
        .viewer-layout-trigger {
          display: inline-flex;
        }
        /* full-width grab bar pinned to the top of the wrapping drawer */
        .viewer-layout-close {
          display: block;
          flex: 0 0 100%;
          width: 40px;
          height: 4px;
          margin: 0 auto 10px;
          padding: 0;
          border: none;
          border-radius: 999px;
          background: var(--line);
          cursor: pointer;
        }
        /* drawer floats above the footer, translated off-frame until .is-open.
           viewer.css supplies `.viewer-layout.is-open{transform:translateY(0)}`. */
        .viewer-layout {
          position: absolute;
          right: 8px;
          bottom: calc(100% + 8px);
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: flex-end;
          max-width: min(92vw, 640px);
          padding: 12px;
          background: var(--teal);
          border: 1px solid var(--line);
          border-radius: 10px;
          transform: translateY(160%);
          z-index: 30;
          /* NB: no transition here — the live site's open/close animation is
             authored in Webflow. viewer.css's .viewer-layout.is-open sets
             transform:translateY(0) to reveal it. */
        }
      }

      /* ---- SIDE PANELS [WF] — the live site authors position / off-canvas
           translate / background / .7s transform transition in Webflow; the
           visibility + .is-open reveal ship in viewer.css. Restated here so the
           mock slides + populates. ---- */
      .viewer-meta,
      .viewer-search,
      .viewer-article-info {
        position: absolute;
        top: 0;
        bottom: 0;
        z-index: 5;
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        padding: 20px 20px 0;
        background: var(--teal);
        box-shadow: 0 0 16px #060e2540;
      }
      .viewer-meta,
      .viewer-search {
        left: 0;
        transform: translateX(-110%);
      }
      .viewer-article-info {
        right: 0;
        transform: translateX(110%);
      }
      .panel-scroll {
        overflow: auto;
        flex: 1;
      }
      .panel-title {
        font-size: 22px;
        margin: 0;
      }
      .panel-issue {
        margin: 0 0 8px;
      }
      .viewer-meta-details {
        margin: 8px 0;
        padding: 0;
      }
      .viewer-meta-details > div {
        display: flex;
        gap: 8px;
      }
      .viewer-meta-details dt {
        opacity: 0.8;
      }
      .viewer-meta-details dd {
        margin: 0;
      }
      .viewer-meta-links {
        list-style: none;
        padding: 0;
        margin: 8px 0;
      }
      .divider {
        height: 1px;
        background: rgba(173, 231, 247, 0.3);
        margin: 12px 0;
      }
      .viewer-article-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .viewer-article-list.can-scroll {
        overflow: auto;
      }
      .viewer-article-item {
        padding: 10px 0;
        border-bottom: 1px solid rgba(173, 231, 247, 0.25);
        cursor: pointer;
      }
      .viewer-article-item:hover {
        color: var(--line);
      }
      .art-col {
        font-size: 12px;
        opacity: 0.8;
      }
      .art-title {
        font-size: 18px;
        margin: 2px 0;
      }
      .art-author {
        font-size: 12px;
        opacity: 0.8;
      }
      .panel-head {
        padding-bottom: 8px;
      }
      .article-info-item {
        padding: 12px 0;
        border-bottom: 1px solid rgba(173, 231, 247, 0.25);
      }
      .art-label {
        font-size: 12px;
        opacity: 0.8;
        margin: 0 0 4px;
      }
      .article-info-list {
        margin: 8px 0;
        padding: 0;
      }
      .article-info-row {
        display: flex;
        gap: 8px;
        align-items: baseline;
        margin: 4px 0;
      }
      .article-info-row.cc-keyword {
        align-items: flex-start;
      }
      .article-info-row dt {
        font-size: 12px;
        opacity: 0.8;
        flex-shrink: 0;
      }
      .article-info-row dd {
        margin: 0;
      }
      [data-field="article-type"] {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 10px;
        background: rgba(173, 231, 247, 0.2);
        font-size: 12px;
      }
      .ul {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .viewer-meta-extlink {
        position: relative;
        color: var(--line);
        text-decoration: underline;
      }
      .viewer-search-form {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input-clear-wrapper {
        position: relative;
        flex: 1;
      }
      .viewer-search-input {
        width: 100%;
        padding: 8px 28px 8px 0;
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--line);
        color: #fff;
        font-family: inherit;
      }
      .input-clear-btn {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
      }
      .viewer-search-btn {
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        font-size: 16px;
      }
      .viewer-search-empty {
        padding: 12px 0;
        opacity: 0.8;
      }
      .viewer-close-wrap {
        padding: 12px 0;
      }
      .viewer-close-btn {
        background: none;
        border: 1px solid var(--line);
        color: #fff;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        cursor: pointer;
      }
      .viewer-close-spacer {
        height: 24px;
      }
      .u-link-cover {
        position: absolute;
        inset: 0;
      }

      /* ---- copy-link toast [WF] ---- */
      .viewer-link-alert {
        position: absolute;
        z-index: 20;
        top: calc(100% + 8px);
        right: 12px;
        padding: 8px 10px;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--teal);
        opacity: 0;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }
    </style>
  </head>
  <body>
    <!-- [data-viewer] scopes every hook; .viewer-root carries orientation/fullscreen classes -->
    <div class="viewer-root" data-viewer>
      <!-- ============ TOP NAV (Navigation/Search/Metadata stages — static preview) ============ -->
      <header class="viewer-toolbar-top">
        <div class="nav-group">
          <a href="#" id="js-back"><span class="nav-ico">←</span>返回</a>
          <button id="js-toc-trigger"><span class="nav-ico">☰</span>刊物目錄</button>
          <button id="js-search-trigger"><span class="nav-ico">🔍</span>搜尋內文</button>
        </div>
        <div class="nav-group" style="position: relative">
          <button id="js-article-info" aria-haspopup="dialog" aria-expanded="false"><span class="nav-ico">ⓘ</span>文章資訊</button>
          <button id="js-share"><span class="nav-ico">🔗</span></button>
          <!-- copy-link toast — viewer.js reveals it ~4s after #js-share copies the URL -->
          <div class="viewer-link-alert" data-viewer-alert role="status" aria-live="polite"><div class="paragraph-sm">已複製此頁連結</div></div>
        </div>
      </header>

      <!-- ============ STAGE ============ -->
      <main class="viewer-stage">
        <button class="viewer-arrow" id="js-prev-page" aria-label="上一頁">‹</button>
        <div id="js-page-container" class="viewer-page-container"><!-- cloned from a template --></div>
        <button class="viewer-arrow" id="js-next-page" aria-label="下一頁">›</button>

        <!-- ============ SIDE PANELS (populated by viewer.js from state.book) ============
             Hooks (author these data-* in Webflow; keep ONE [data-tpl] row per list
             and delete the extra sample rows). Triggers keep their js- ids. -->

        <!-- 1. Book Metadata Panel — #js-toc-trigger -->
        <div class="viewer-meta" data-viewer-panel="meta">
          <div class="panel-scroll">
            <hgroup>
              <h1 class="panel-title" data-field="journal">—</h1>
              <div class="panel-issue h4">第 <span data-field="journal-issue"></span> 期</div>
            </hgroup>
            <dl class="viewer-meta-details">
              <div u-flex="row-left-center"><dt>出版商　：</dt><dd data-field="publisher"></dd></div>
              <div><dt>全冊頁數：</dt><dd data-field="page-count">xx 頁</dd></div>
              <div><dt>出版日期：</dt><dd data-field="book-date"><time datetime=""></time></dd></div>
            </dl>
            <ul class="viewer-meta-links">
              <li class="viewer-meta-extlink"><div>浸大圖書館目錄</div><a href="#" class="u-link-cover"></a></li>
              <li class="viewer-meta-extlink"><div>電影相關連結</div><a href="#" class="u-link-cover"></a></li>
            </ul>
            <div class="divider"></div>
            <section aria-labelledby="book-toc-heading">
              <h2 id="book-toc-heading" class="h5">文章目錄</h2>
              <!-- ONE [data-tpl="toc-item"] row; viewer.js clones it per (type-filtered) article -->
              <ul class="viewer-article-list" data-viewer-toc-list>
                <li class="viewer-article-item" data-tpl="toc-item">
                  <div data-field="column" class="art-col"></div>
                  <div data-field="title" class="art-title"></div>
                  <div data-field="author" class="art-author"></div>
                </li>
              </ul>
            </section>
            <div class="viewer-close-spacer"></div>
          </div>
          <div class="viewer-close-wrap"><button class="viewer-close-btn" data-viewer-close aria-label="關閉">✕</button></div>
        </div>

        <!-- 2. Search Panel — #js-search-trigger -->
        <div class="viewer-search" data-viewer-panel="search">
          <form class="viewer-search-form" data-viewer-search-form>
            <div class="input-clear-wrapper">
              <input type="search" class="viewer-search-input" data-viewer-search-input placeholder="搜尋內文" aria-label="搜尋內文" />
              <button type="button" data-input-clear aria-label="Clear" class="input-clear-btn">✕</button>
            </div>
            <button class="viewer-search-btn" type="submit" aria-label="搜尋">🔍</button>
          </form>
          <div class="divider"></div>
          <!-- shown only after a search with no matches -->
          <div class="viewer-search-empty is-hidden" data-viewer-search-empty>沒有查詢結果</div>
          <!-- shown only when there are matches; ONE [data-tpl="search-item"] row -->
          <ul class="viewer-article-list can-scroll is-hidden" data-viewer-search-results>
            <li class="viewer-article-item" data-tpl="search-item">
              <div data-field="column" class="art-col"></div>
              <div data-field="title" class="art-title"></div>
              <div data-field="author" class="art-author"></div>
            </li>
            <div class="viewer-close-spacer"></div>
          </ul>
          <div class="viewer-close-wrap"><button class="viewer-close-btn" data-viewer-close aria-label="關閉">✕</button></div>
        </div>

        <!-- 3. Article Metadata Panel — #js-article-info (disabled in thumbnail view) -->
        <section class="viewer-article-info" data-viewer-panel="article" aria-labelledby="article-info-heading">
          <div class="panel-head">
            <h2 id="article-info-heading" class="h5">文章資訊 (第 <span data-field="page-list"></span> 頁)</h2>
          </div>
          <!-- ONE [data-tpl="article-info-item"] article; viewer.js clones it per visible article -->
          <div class="panel-scroll" data-viewer-article-list>
            <article class="article-info-item" data-tpl="article-info-item">
              <p class="art-label">文章標題：</p>
              <h3 data-field="title" class="art-title"></h3>
              <dl class="article-info-list">
                <div class="article-info-row"><dt>作者　　：</dt><dd data-field="author"></dd></div>
                <div class="article-info-row"><dt>專欄　　：</dt><dd data-field="column"></dd></div>
                <div class="article-info-row"><dt>頁碼　　：</dt><dd data-field="page"></dd></div>
                <div class="article-info-row"><dt>文章類別：</dt><dd data-field="article-type"></dd></div>
                <!-- whole row hides when the article has no keywords -->
                <div class="article-info-row cc-keyword" data-viewer-keyword-row>
                  <dt>文章關鍵字：</dt>
                  <dd>
                    <ul class="ul" data-viewer-keyword-list>

        <!-- .ocr-toc-list holds ONE Webflow-authored row (hooked via

        <ul class="ocr-toc-list" id="js-ocr-toc-list">

               .ocr-toc-item style class in Webflow doesn't break viewer.js. Fills each

               (like the result cards). -->

            <div class="ocr-toc-column" data-field="column"></div>
            <div class="ocr-toc-title" data-field="title"></div>
            <div class="ocr-toc-author" data-field="author"></div>
          </li>

    <!-- Preview-only dropdown behavior: stands in for the design-system forms.js
       (the real site loads bundles/all.js). Toggles .is-open, and on option
       click sets aria-selected + the hidden input value, reflects the label from
       .dropdown-option-label, and dispatches 'input' (what viewer.js listens for). -->
    <script>
      (function () {
        document.querySelectorAll("[data-dropdown]").forEach(function (dd) {
          var trigger = dd.querySelector("[data-dropdown-trigger]");
          var hidden = dd.querySelector('input[type="hidden"]');
          var valueEl = dd.querySelector("[data-dropdown-value]");
          var options = dd.querySelectorAll("[data-dropdown-option], .dropdown-option");
          trigger.addEventListener("click", function (e) {
            e.stopPropagation();
            if (trigger.disabled) return;
            document.querySelectorAll("[data-dropdown].is-open").forEach(function (o) {
              if (o !== dd) o.classList.remove("is-open");
            });
            dd.classList.toggle("is-open");
            trigger.setAttribute("aria-expanded", dd.classList.contains("is-open") ? "true" : "false");
          });
          options.forEach(function (opt) {
            opt.addEventListener("click", function () {
              if (hidden) hidden.value = opt.getAttribute("data-value");
              var lab = opt.querySelector("[data-dropdown-option-label], .dropdown-option-label");
              if (valueEl) valueEl.textContent = ((lab ? lab.textContent : opt.textContent) || "").trim();
              options.forEach(function (o) {
                o.setAttribute("aria-selected", o === opt ? "true" : "false");
              });
              dd.classList.remove("is-open");
              trigger.setAttribute("aria-expanded", "false");
              if (hidden) hidden.dispatchEvent(new Event("input", { bubbles: true }));
            });
          });
        });
        document.addEventListener("click", function () {
          document.querySelectorAll("[data-dropdown].is-open").forEach(function (o) {
            o.classList.remove("is-open");
          });
        });
      })();
    </script>

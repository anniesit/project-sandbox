<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影視刊物資料庫 · 書刊閱讀器</title>
    <link rel="stylesheet" href="https://hkbuproject-sandbox.vercel.app/filmtv/font/genryumin-tc/genryumin-tc.css" />
    <link rel="stylesheet" href="viewer.css" />

    <!-- ⚠️ PREVIEW CHROME ONLY — not part of the handoff. On the live site all of
         this (page shell, top/bottom toolbars, nav, arrows, dropdowns, buttons,
         inputs, dividers) is authored in Webflow and styled by the Webflow /
         design-system CSS. It is restated here so the standalone viewer.html
         mock renders faithfully without loading the Webflow stylesheet. The
         real viewer engine CSS lives in viewer.css.
         Selectors marked [WF] have a same-named rule in the Webflow export —
         Webflow owns them on the live site; they only exist here for the mock. -->
    <style>
      :root {
        --teal: #00485c;
        --teal-dark: #003240;
        --line: #ade7f7;
        --paper: #fff;
        --primary: "GenRyuMin2 TC", "Songti TC", "Noto Serif TC", serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: var(--primary);
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      /* ---- root shell (flex column: nav / stage / controls) ---- */
      .viewer-root {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--teal-dark);
      }
      .viewer-root.is-fullscreen {
        height: 100vh;
      }

      /* ---- top nav ---- */
      .viewer-toolbar-top {
        background: var(--teal);
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 52px;
        padding: 0 16px;
      }
      .viewer-toolbar-top .nav-group {
        display: flex;
        gap: 32px;
        align-items: center;
      }
      .viewer-toolbar-top a,
      .viewer-toolbar-top button {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        background: none;
        border: 0;
        color: #fff;
        font: 500 16px/1.6 var(--primary);
        cursor: pointer;
      }
      .nav-ico {
        width: 24px;
        height: 24px;
        display: inline-block;
        opacity: 0.9;
      }

      /* ---- stage (Webflow: .page-main.viewer-stage{position:relative}; ensure
       it also has a definite height + overflow:hidden so the absolutely-filled
       #js-page-container clips and the fit rules stay responsive) ---- */
      .viewer-stage {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
      }

      /* ---- arrows [WF: .viewer-arrow, :hover, .is-left, .is-right] ---- */
      .viewer-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 5;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 72, 92, 0.55);
        color: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
      }
      .viewer-arrow:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .viewer-arrow.is-hidden {
        display: none !important;
      }
      #js-prev-page {
        left: 16px;
      }
      #js-next-page {
        right: 16px;
      }

      /* ---- bottom controls ---- */
      .viewer-toolbar-bottom {
        background: var(--teal);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        min-height: 52px;
        gap: 8px;
      }
      .page-indicator {
        display: flex;
        gap: 8px;
        align-items: center;
        font:
          400 16px/1.1 Inter,
          system-ui,
          sans-serif;
      }
      /* [WF: .input.cc-viewer] */
      #js-page-input {
        width: 42px;
        text-align: center;
        padding: 3px 4px;
        color: #fff;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 4px;
        font: inherit;
      }
      #js-page-input:disabled {
        opacity: 0.4;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .controls .ctl-label {
        font: 500 16px/1.6 var(--primary);
      }
      /* [WF: .divider] */
      .divider {
        color: var(--line);
        padding: 0 8px;
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: 0;
        color: #fff;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }
      .icon-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* ---- dropdown component [WF: .dropdown, .dropdown-trigger (+ :hover/
       :focus-visible), .dropdown-trigger-label, .dropdown-trigger-icon,
       .dropdown-list, .dropdown-option (+ :hover/:focus-visible),
       .dropdown-option-check]. Webflow authors all of this; restated for the
       mock. Selection is driven by aria-selected (set by forms.js / the preview
       script / viewer.js), NOT by a radio — matching the single-select
       component. The mock uses the [data-dropdown*] attribute hooks; Webflow
       uses the matching classes. ---- */
      [data-dropdown] {
        position: relative;
      }
      [data-dropdown-trigger] {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 4px 8px 4px 12px;
        background: none;
        color: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: 500 16px/1.6 var(--primary);
        cursor: pointer;
      }
      [data-dropdown-trigger]:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .dropdown-trigger-label {
        white-space: nowrap;
      }
      .dropdown-trigger-icon {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        transition: transform 0.15s ease;
      }
      [data-dropdown].is-open .dropdown-trigger-icon {
        transform: rotate(180deg);
      }
      .dropdown-list {
        position: absolute;
        bottom: calc(100% + 6px);
        left: 0;
        min-width: 100%;
        margin: 0;
        padding: 4px;
        list-style: none;
        background: var(--teal);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: none;
        z-index: 20;
      }
      [data-dropdown].is-open .dropdown-list {
        display: block;
      }
      /* option row: label grows, the check sits on whichever side the markup
       places it (right for the DS layout/zoom lists, left for the scroll popover). */
      .dropdown-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        white-space: nowrap;
        border-radius: 4px;
        cursor: pointer;
      }
      .dropdown-option:hover {
        background: rgba(173, 231, 247, 0.15);
      }
      .dropdown-option-label {
        flex: 1 1 auto;
      }
      .dropdown-option-check {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        opacity: 0;
        color: var(--line);
      }
      /* DS single-select shows the check on the aria-selected option */
      .dropdown-option[aria-selected="true"] .dropdown-option-check {
        opacity: 1;
      }
      /* NB: the ⋯ scroll popover (.scroll-wrap / .dropdown-list.cc-viewer-bottom)
         is NOT here — viewer.js drives its open state, so it ships in viewer.css
         (Webflow/forms.js only open [data-dropdown] dropdowns). */

      /* OCR TOC list — now a Webflow-authored template row (.ocr-toc-item), like the
         result cards. Preview copy of what you style in Webflow (replaces the old
         #js-ocr-toc-list id rules that used to live in viewer.css). */
      .ocr-toc-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .ocr-toc-item {
        padding: 4px 6px;
        border-radius: 4px;
        cursor: pointer;
      }
      .ocr-toc-item:hover {
        background: rgba(0, 72, 92, 0.1);
      }
      /* preview hierarchy for the 3 leaves (column / title / author) — your Webflow
         design owns the real look; these just keep the mock legible. */
      .ocr-toc-column {
        font-size: 12px;
        opacity: 0.7;
      }
      .ocr-toc-title {
        font-size: 16px;
        font-weight: 700;
      }
      .ocr-toc-author {
        font-size: 12px;
        opacity: 0.7;
      }

      /* ---- PREVIEW-ONLY: sharpen button + responsive layout drawer. On the live
         site Webflow owns .viewer-nav-btn / .viewer-layout / .viewer-layout-trigger
         (incl. the per-breakpoint translateY). Restated here so the mock exercises
         viewer.js's .is-open / .is-active toggles. [WF] ---- */
      .viewer-nav-btn.cc-sharpen {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #fff;
        padding: 4px 10px;
        font: 500 15px/1.6 var(--primary);
        cursor: pointer;
      }
      .viewer-nav-btn.cc-sharpen.is-active {
        background: var(--line);
        color: var(--teal-dark);
      }
      /* trigger hidden on desktop (drawer is always in-frame) */
      .viewer-layout-trigger {
        display: none;
        gap: 6px;
        align-items: center;
        background: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #fff;
        padding: 4px 10px;
        font: 500 15px/1.6 var(--primary);
        cursor: pointer;
      }
      /* drawer handle (grab bar) — hidden on desktop (drawer is inline); the live
         site styles this in Webflow. [WF] */
      .viewer-layout-close {
        display: none;
      }
      @media (max-width: 991px) {
        .viewer-toolbar-bottom {
          position: relative;
        }
        .viewer-layout-trigger {
          display: inline-flex;
        }
        /* full-width grab bar pinned to the top of the wrapping drawer */
        .viewer-layout-close {
          display: block;
          flex: 0 0 100%;
          width: 40px;
          height: 4px;
          margin: 0 auto 10px;
          padding: 0;
          border: none;
          border-radius: 999px;
          background: var(--line);
          cursor: pointer;
        }
        /* drawer floats above the footer, translated off-frame until .is-open.
           viewer.css supplies `.viewer-layout.is-open{transform:translateY(0)}`. */
        .viewer-layout {
          position: absolute;
          right: 8px;
          bottom: calc(100% + 8px);
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: flex-end;
          max-width: min(92vw, 640px);
          padding: 12px;
          background: var(--teal);
          border: 1px solid var(--line);
          border-radius: 10px;
          transform: translateY(160%);
          z-index: 30;
          /* NB: no transition here — the live site's open/close animation is
             authored in Webflow. viewer.css's .viewer-layout.is-open sets
             transform:translateY(0) to reveal it. */
        }
      }
    </style>
  </head>
  <body>
    <!-- [data-viewer] scopes every hook; .viewer-root carries orientation/fullscreen classes -->
    <div class="viewer-root" data-viewer>
      <!-- ============ TOP NAV (Navigation/Search/Metadata stages — static preview) ============ -->
      <header class="viewer-toolbar-top">
        <div class="nav-group">
          <a href="#" id="js-back"><span class="nav-ico">←</span>返回</a>
          <button id="js-toc-trigger"><span class="nav-ico">☰</span>刊物目錄</button>
          <button id="js-search-trigger"><span class="nav-ico">🔍</span>搜尋內文</button>
        </div>
        <div class="nav-group">
          <button id="js-article-info"><span class="nav-ico">ⓘ</span>文章資訊</button>
          <button id="js-share"><span class="nav-ico">🔗</span></button>
        </div>
      </header>

      <!-- ============ STAGE ============ -->
      <main class="viewer-stage">
        <button class="viewer-arrow" id="js-prev-page" aria-label="上一頁">‹</button>
        <div id="js-page-container" class="viewer-page-container"><!-- cloned from a template --></div>
        <button class="viewer-arrow" id="js-next-page" aria-label="下一頁">›</button>
      </main>

      <!-- ============ BOTTOM CONTROLS ============ -->
      <footer class="viewer-toolbar-bottom">
        <div class="page-indicator">
          <span>頁</span>
          <input id="js-page-input" type="text" inputmode="numeric" value="1" aria-label="頁碼" />
          <span>/</span>
          <span id="js-page-total">16</span>
        </div>

        <!-- PREVIEW: the trigger + .viewer-layout drawer mirror the live Webflow
             footer. On tablet & below the drawer is translated off-frame and the
             trigger reveals it (viewer.js toggles .is-open). -->
        <button type="button" id="js-viewer-layout-trigger" class="viewer-layout-trigger" aria-haspopup="true" aria-expanded="false">⚙ 版面配置</button>
        <div id="js-viewer-layout" class="viewer-layout controls">
          <!-- PREVIEW mirror of the Webflow drawer handle (grab bar). viewer.js
               (layoutPanelClose) wires its click to close the drawer. [WF] -->
          <button type="button" id="js-viewer-layout-close" class="viewer-layout-close" aria-label="關閉版面配置"></button>
          <span class="ctl-label">版面配置</span>
          <!-- Layout dropdown — design-system single-select (data-dropdown-option
               + .dropdown-option-label + .dropdown-option-check, aria-selected). -->
          <div class="dropdown" data-dropdown id="js-layout-dropdown">
            <input type="hidden" name="layout" value="double" />
            <button type="button" data-dropdown-trigger aria-haspopup="listbox" aria-expanded="false">
              <span data-dropdown-value class="dropdown-trigger-label">雙頁</span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-trigger-icon"><path d="M216.49,104.49l-80,80a12,12,0,0,1-17,0l-80-80a12,12,0,0,1,17-17L128,159l71.51-71.52a12,12,0,0,1,17,17Z"/></svg>
            </button>
            <ul role="listbox" class="dropdown-list">
              <li role="option" aria-selected="true" data-value="double" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">雙頁</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="single" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">單頁</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="ocr" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">顯示純文字</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="thumbnail" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">縮圖</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
            </ul>
          </div>

          <!-- "⋯" scroll popover — two single-select groups (捲動方向 + 連接方向) using
               the SAME check-select pattern + <li> structure as the layout/zoom dropdowns:
               each option's aria-selected reveals the .dropdown-option-check. No radios —
               viewer.js reads the click/keys (data-scroll-direction / data-connect-mode) and
               owns aria-selected/aria-disabled, because forms.js single-select handles only
               ONE group and this menu has two. -->
          <div class="scroll-wrap">
            <button type="button" class="icon-btn" id="js-scroll-popover-trigger" aria-label="捲動設定" aria-haspopup="menu" aria-expanded="false">⋯</button>
            <ul class="dropdown-list cc-viewer-bottom" id="js-scroll-popover" role="menu">
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-scroll-direction="flip" aria-selected="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">翻頁</span>
              </li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-scroll-direction="vertical" aria-selected="false">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">垂直捲動</span>
              </li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-scroll-direction="horizontal" aria-selected="false">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">水平捲動</span>
              </li>
              <li class="scroll-popover-divider" role="separator"></li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-connect-mode="next" aria-selected="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">連接下頁</span>
              </li>
              <li class="dropdown-option" role="menuitemradio" tabindex="-1" data-connect-mode="previous" aria-selected="false">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
                <span class="dropdown-option-label">連接上頁</span>
              </li>
            </ul>
          </div>

          <span class="divider">|</span>
          <span class="ctl-label">縮放</span>
          <!-- Zoom dropdown (no +/- buttons — D1) -->
          <div class="dropdown" data-dropdown id="js-zoom-dropdown">
            <input type="hidden" name="zoom" value="fit-page" />
            <button type="button" data-dropdown-trigger aria-haspopup="listbox" aria-expanded="false">
              <span data-dropdown-value class="dropdown-trigger-label">符合頁面</span>
              <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-trigger-icon"><path d="M216.49,104.49l-80,80a12,12,0,0,1-17,0l-80-80a12,12,0,0,1,17-17L128,159l71.51-71.52a12,12,0,0,1,17,17Z"/></svg>
            </button>
            <ul role="listbox" class="dropdown-list">
              <li role="option" aria-selected="false" data-value="fit-width" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">符合頁寬</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="true" data-value="fit-page" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">符合頁面</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="100" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">100%</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
              <li role="option" aria-selected="false" data-value="150" data-dropdown-option class="dropdown-option">
                <span data-dropdown-option-label class="dropdown-option-label">150%</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256" aria-hidden="true" class="dropdown-option-check"><path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z"/></svg>
              </li>
            </ul>
          </div>

          <button type="button" class="icon-btn" id="js-fullscreen" aria-label="全螢幕">⛶</button>

          <span class="divider">|</span>
          <span class="ctl-label">旋轉</span>

          <span class="divider">|</span>
          <!-- 銳化 sharpen toggle — viewer.js adds .is-active when the filter is on -->
          <button type="button" id="js-sharpen" class="viewer-nav-btn cc-sharpen">✦ 銳化</button>

    <template id="tpl-layout-double">

    </template>

    <template id="tpl-layout-ocr">
      <div class="ocr-panel" data-role="ocr-panel">
        <button class="ocr-toc-trigger is-hidden" id="js-ocr-toc-trigger" type="button">純文字目錄</button>
        <div class="ocr-content" id="js-ocr-content"></div>
        <div class="ocr-font-controls">
          <span>字體大小</span>

          <button class="ocr-font-btn" id="js-ocr-font-increase" type="button">＋</button>
        </div>
      </div>
      <div class="ocr-page-stage" data-role="ocr-page-stage"><img class="page-image" data-role="page-image" alt="" draggable="false" /></div>
    </template>

    <template id="tpl-layout-thumbnail">
      <div class="thumbnail-grid" id="js-thumbnail-grid"></div>
    </template>

    <template id="tpl-thumbnail-item">
      <button class="thumbnail-item" data-role="thumbnail-item" type="button">
        <img class="thumbnail-image" data-role="thumbnail-image" alt="" />
        <span class="thumbnail-label" data-role="thumbnail-label"></span>
      </button>
    </template>

    <template id="tpl-ocr-article-block">
      <div class="ocr-article-block">
        <div class="ocr-article-body" data-role="ocr-article-body"></div>
      </div>
    </template>

    <template id="tpl-ocr-toc-popover">
      <div class="ocr-toc-popover" id="js-ocr-toc-popover">
        <div class="ocr-toc-header" data-role="ocr-toc-header"></div>
        <!-- .ocr-toc-list holds ONE Webflow-authored row (hooked via
             [data-tpl="ocr-toc-item"], styled via .ocr-toc-item) that viewer.js clones
             per article (same pattern as the result cards). -->
        <ul class="ocr-toc-list" id="js-ocr-toc-list">
          <!-- ONE template row, hooked by [data-tpl="ocr-toc-item"] so renaming the
               .ocr-toc-item style class in Webflow doesn't break viewer.js. Fills each
               [data-field] and hides the column/author leaf when its value is empty
               (like the result cards). -->
          <li class="ocr-toc-item" data-tpl="ocr-toc-item">
            <div class="ocr-toc-column" data-field="column"></div>
            <div class="ocr-toc-title" data-field="title"></div>
            <div class="ocr-toc-author" data-field="author"></div>
          </li>
        </ul>
      </div>
    </template>

    <!-- Preview-only dropdown behavior: stands in for the design-system forms.js
       (the real site loads bundles/all.js). Toggles .is-open, and on option
       click sets aria-selected + the hidden input value, reflects the label from
       .dropdown-option-label, and dispatches 'input' (what viewer.js listens for). -->
    <script>
      (function () {
        document.querySelectorAll("[data-dropdown]").forEach(function (dd) {
          var trigger = dd.querySelector("[data-dropdown-trigger]");
          var hidden = dd.querySelector('input[type="hidden"]');
          var valueEl = dd.querySelector("[data-dropdown-value]");
          var options = dd.querySelectorAll("[data-dropdown-option], .dropdown-option");
          trigger.addEventListener("click", function (e) {
            e.stopPropagation();
            if (trigger.disabled) return;
            document.querySelectorAll("[data-dropdown].is-open").forEach(function (o) {
              if (o !== dd) o.classList.remove("is-open");
            });
            dd.classList.toggle("is-open");
            trigger.setAttribute("aria-expanded", dd.classList.contains("is-open") ? "true" : "false");
          });
          options.forEach(function (opt) {
            opt.addEventListener("click", function () {
              if (hidden) hidden.value = opt.getAttribute("data-value");
              var lab = opt.querySelector("[data-dropdown-option-label], .dropdown-option-label");
              if (valueEl) valueEl.textContent = ((lab ? lab.textContent : opt.textContent) || "").trim();
              options.forEach(function (o) {
                o.setAttribute("aria-selected", o === opt ? "true" : "false");
              });
              dd.classList.remove("is-open");
              trigger.setAttribute("aria-expanded", "false");
              if (hidden) hidden.dispatchEvent(new Event("input", { bubbles: true }));
            });
          });
        });
        document.addEventListener("click", function () {
          document.querySelectorAll("[data-dropdown].is-open").forEach(function (o) {
            o.classList.remove("is-open");
          });
        });
      })();
    </script>

    <!-- viewer.js = the reusable viewer (stays after integration).
       viewer.mock.js = the disposable sample-data loader + dev switcher. -->
    <script src="viewer.js"></script>
    <script src="viewer.mock.js"></script>
  </body>
